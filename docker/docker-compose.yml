services:

  postgres:
    image: postgres:17

    container_name: posto-db

    env_file:
      - ../infra/.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data              #persistência usando o volume postgres_data
      - ../database/DDLs:/docker-entrypoint-initdb.d        #para acessar e criar as tabelas

    restart: unless-stopped

volumes:
  postgres_data: